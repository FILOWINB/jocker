<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetJocker</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: radial-gradient(circle at top, #1a001a, #000);
    overflow-x: hidden;
  }

  .logo img {
    width: 80%;
    max-width: 260px;
    margin-top: 20px;
  }

  .botones {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    padding: 0 15px;
  }

  .btn {
    width: 100%;
    max-width: 300px;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    color: white;
  }

  .atencion {
    background: #ff0080;
  }

  .soporte {
    background: #cc00ff;
  }

  .ventas {
    background: #25D366;
    font-size: 18px;
  }

  /* 🔥 POPUP ARREGLADO PARA CELU */
  .popup {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff0080;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 13px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    z-index: 999;
  }

  /* NOTI */
  .noti {
    position: fixed;
    bottom: 10px;
    left: 10px;
    right: 10px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>

<body>

  <div class="popup" id="popup">🔥 30% DE REGALO ACTIVO 🔥</div>

  <div class="logo">
    <img src="logo.png" alt="BetJocker">
  </div>

  <div class="botones">

    <a href="https://wa.me/5491168164407?text=Quiero%20el%2030%25%20de%20regalo" class="btn atencion" target="_blank">
      💬 Atención inmediata
    </a>

    <a href="https://wa.me/5491168164169?text=Quiero%20el%2030%25%20de%20regalo" class="btn soporte" target="_blank">
      🎰 Soporte de juego
    </a>

    <a href="https://wa.me/5491168164385?text=Quiero%20el%2030%25%20de%20regalo" class="btn ventas" target="_blank">
      💰 HACÉ CLICK PARA CARGAR
    </a>

  </div>

  <div class="noti" id="noti"></div>

  <script>
    // POPUP aparece
    setTimeout(() => {
      document.getElementById('popup').style.display = 'block';
    }, 1500);

    // NOTIFICACIONES FAKE
    const nombres = ["Juan", "Lucas", "Martín", "Sofía", "Micaela", "Tomi"];
    const montos = ["$5.000", "$10.000", "$25.000", "$50.000"];

    function mostrarNoti() {
      const nombre = nombres[Math.floor(Math.random() * nombres.length)];
      const monto = montos[Math.floor(Math.random() * montos.length)];

      const noti = document.getElementById('noti');
      noti.innerText = `${nombre} acaba de cargar ${monto}`;
      noti.style.display = 'block';

      setTimeout(() => {
        noti.style.display = 'none';
      }, 3000);
    }

    setInterval(mostrarNoti, 5000);
  </script>

</body>
</html>
