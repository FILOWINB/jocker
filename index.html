<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetJocker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: radial-gradient(circle at top, #1a001a, #000);
      overflow-x: hidden;
      padding-bottom: 40px; /* evita que se corte abajo */
    }

    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, rgba(255,0,150,0.05), rgba(255,0,150,0.05) 10px, transparent 10px, transparent 20px);
      animation: moveBg 10s linear infinite;
      z-index: 0;
    }

    @keyframes moveBg {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    .logo img {
      width: 80%;
      max-width: 260px;
      margin-top: 20px;
      filter: drop-shadow(0 0 20px #ff0080);
      animation: glow 2s infinite alternate;
      position: relative;
      z-index: 2;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px #ff0080); }
      to { filter: drop-shadow(0 0 30px #ff0080); }
    }

    .botones {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      padding: 0 15px;
      position: relative;
      z-index: 2;
    }

    .btn {
      width: 100%;
      max-width: 300px;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.95); }

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: 0.5s;
    }

    .btn:hover::after { left: 100%; }

    .atencion {
      background: #ff0080;
      box-shadow: 0 0 15px #ff0080;
      animation: vibrarSuave 2s infinite;
    }

    .soporte {
      background: #cc00ff;
      box-shadow: 0 0 15px #cc00ff;
      animation: vibrarSuave 2s infinite;
    }

    .ventas {
      background: #25D366;
      box-shadow: 0 0 20px #25D366;
      font-size: 18px;
      animation: vibrar 0.8s infinite;
    }

    @keyframes vibrar {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes vibrarSuave {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .popup {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff0080;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 13px;
      width: 90%;
      max-width: 320px;
      text-align: center;
      z-index: 999;
      display: none;
    }

    .noti {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: #111;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      text-align: center;
      display: none;
      z-index: 999;
    }

    .jackpotFX {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      color: gold;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      z-index: 1000;
      animation: zoom 0.5s ease;
    }

    @keyframes zoom {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="popup" id="popup">🔥 20% DE REGALO ACTIVO 🔥</div>

  <div class="logo">
    <img src="logo.png" alt="BetJocker">
  </div>

  <div class="botones">

    <a href="https://wa.me/5491168164407?text=Quiero%20el%2020%25%20de%20regalo" class="btn atencion" target="_blank">
      💬 Atención inmediata
    </a>

    <a href="https://wa.me/5491168164169?text=Quiero%20el%2020%25%20de%20regalo" class="btn soporte" target="_blank">
      🎰 Soporte de juego
    </a>

    <a href="https://wa.me/5491168164385?text=Quiero%20el%2020%25%20de%20regalo" class="btn ventas" id="btnVentas" target="_blank">
      💰 HACÉ CLICK PARA CARGAR
    </a>

  </div>

  <div class="noti" id="noti"></div>
  <div class="jackpotFX" id="jackpotFX">💰 GANASTE UN BONO 💰</div>

  <audio id="sonido" src="https://www.soundjay.com/misc/sounds/coins-01.mp3"></audio>

  <script>
    setTimeout(() => {
      document.getElementById('popup').style.display = 'block';
    }, 1500);

    const nombres = ["Juan", "Lucas", "Martín", "Sofía", "Micaela", "Tomi"];
    const montos = ["$5.000", "$10.000", "$25.000", "$50.000"];

    function mostrarNoti() {
      const nombre = nombres[Math.floor(Math.random() * nombres.length)];
      const monto = montos[Math.floor(Math.random() * montos.length)];
      const noti = document.getElementById('noti');
      noti.innerText = `${nombre} acaba de cargar ${monto}`;
      noti.style.display = 'block';
      setTimeout(() => { noti.style.display = 'none'; }, 3000);
    }

    setInterval(mostrarNoti, 5000);

    document.getElementById("btnVentas").addEventListener("click", function() {
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      document.getElementById("sonido").play().catch(()=>{});
      const fx = document.getElementById("jackpotFX");
      fx.style.display = 'flex';
      setTimeout(() => { fx.style.display = 'none'; }, 1200);
    });
  </script>

</body>
</html>
